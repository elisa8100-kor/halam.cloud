<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>관리자</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<div id="login">
<h2>관리자 로그인</h2>
<input type="password" id="pw">
<button onclick="login()">로그인</button>
</div>

<div id="panel" style="display:none">

<h2>공지 추가</h2>

<input id="title" placeholder="제목"><br><br>

<textarea id="content" placeholder="내용"></textarea><br><br>

<select id="type">
<option value="notice">공지</option>
<option value="homework">숙제</option>
<option value="supply">준비물</option>
</select>

<input type="date" id="date">

<button onclick="addNotice()">추가</button>

<h2>공지 목록</h2>

<div id="list"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="admin.js"></script>

</body>
</html>
